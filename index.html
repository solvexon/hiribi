<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hirbi Pro | Advanced Arbitrage Nodes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root { --bg: #050505; --pink: #ff007a; --orange: #ff8c00; --gold: #ffd700; --card: #0f0f0f; }
        body { margin: 0; background-color: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; }

        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(0,0,0,0.9); border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: bold; background: linear-gradient(45deg, var(--pink), var(--orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-connect { background: linear-gradient(45deg, var(--pink), var(--orange)); border: none; color: white; padding: 10px 22px; border-radius: 50px; cursor: pointer; font-family: 'Orbitron'; font-size: 13px; }

        .container { padding: 30px 5%; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); border-radius: 15px; padding: 20px; border: 1px solid #222; text-align: center; }
        .stat-card h4 { margin: 5px 0; color: #888; font-size: 11px; font-family: 'Orbitron'; }
        .stat-card .val { font-size: 20px; font-weight: bold; font-family: 'Orbitron'; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; margin-bottom: 50px; }
        .plan-card { background: var(--card); border-radius: 20px; padding: 35px; border: 1px solid #222; transition: 0.3s; text-align: center; }
        .plan-card:hover { border-color: var(--pink); transform: translateY(-5px); }
        
        /* New Advanced Plan Names Styling */
        .plan-name { font-family: 'Orbitron'; font-size: 20px; letter-spacing: 2px; background: linear-gradient(90deg, var(--gold), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; margin-bottom: 5px; }
        .plan-sub { font-size: 11px; color: #666; margin-bottom: 15px; letter-spacing: 1px; }

        .roi { font-size: 42px; font-weight: 700; margin: 15px 0; font-family: 'Orbitron'; color: #fff; }
        .input-box { width: 100%; background: #000; border: 1px solid #333; padding: 12px; border-radius: 10px; color: #fff; margin-bottom: 15px; text-align: center; font-size: 18px; }
        .btn-invest { width: 100%; padding: 15px; border-radius: 10px; border: none; background: linear-gradient(45deg, var(--orange), var(--pink)); color: white; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; }

        .dashboard-box { background: #080808; border-radius: 25px; padding: 30px; border: 1px dashed #333; }
        .live-counter { font-family: 'Orbitron'; font-size: 24px; color: #00ffcc; margin: 10px 0; }
        
        /* Tag in dashboard */
        .plan-tag { background: rgba(255, 215, 0, 0.1); color: var(--gold); padding: 4px 10px; border-radius: 4px; font-size: 10px; font-family: 'Orbitron'; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">HIRBI PRO</div>
    <button class="btn-connect" onclick="connectWallet()" id="connectBtn">CONNECT WALLET</button>
</nav>

<div class="container">
    
    <!-- User Stats -->
    <div class="stats-grid" id="userStats" style="display:none;">
        <div class="stat-card"><h4>TOTAL INVESTED</h4><div class="val" id="totalInvested">0.00</div></div>
        <div class="stat-card"><h4>TOTAL WITHDRAWN</h4><div class="val" id="totalWithdrawn">0.00</div></div>
        <div class="stat-card"><h4>TOTAL PROFIT</h4><div class="val" id="totalProfit" style="color:#28a745;">0.00</div></div>
    </div>

    <div class="grid">
        <!-- Plan 1 -->
        <div class="plan-card">
            <div class="plan-name">GENESIS NODE</div>
            <div class="plan-sub">30 DAYS TRADING SESSION</div>
            <div class="roi">18% ROI</div>
            <p style="color:var(--gold); font-size: 13px;">Referral Bonus: 7%</p>
            <input type="number" id="amt0" class="input-box" placeholder="Amount USDT">
            <button class="btn-invest" onclick="invest(0)">START SESSION</button>
        </div>

        <!-- Plan 2 -->
        <div class="plan-card">
            <div class="plan-name">QUANTUM ARBITRAGE</div>
            <div class="plan-sub">60 DAYS TRADING SESSION</div>
            <div class="roi">50% ROI</div>
            <p style="color:var(--gold); font-size: 13px;">Referral Bonus: 10%</p>
            <input type="number" id="amt1" class="input-box" placeholder="Amount USDT">
            <button class="btn-invest" onclick="invest(1)">START SESSION</button>
        </div>
    </div>

    <div class="dashboard-box">
        <h2 style="text-align: center; font-family: 'Orbitron'; color: var(--gold); margin-bottom: 25px;">INVESTMENT DETAILS</h2>
        <div id="investmentsList">
            <p style="text-align: center; color: #444;">Please connect your wallet.</p>
        </div>
    </div>
</div>

<script>
    let signer;
    const contractAddress = "0x8497a2a1aeD3EB6688683f363a933aaecA4daB4a"; 
    const usdtAddress = "0x2AEF42da66D2ef5C88C45953d6FDDc25DE23dd23";
    
    // Mapping Plan IDs to Advanced Names
    const planNames = ["GENESIS NODE", "QUANTUM ARBITRAGE", "INSTITUTIONAL CORE"];

    const abi = [{"inputs":[{"internalType":"uint256","name":"_planId","type":"uint256"},{"internalType":"uint256","name":"_amount","type":"uint256"},{"internalType":"address","name":"_referrer","type":"address"}],"name":"invest","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[],"stateMutability":"nonpayable","type":"constructor"},{"inputs":[{"internalType":"uint256","name":"_invIndex","type":"uint256"}],"name":"withdraw","outputs":[],"stateMutability":"nonpayable","type":"function"},{"inputs":[{"internalType":"address","name":"_user","type":"address"}],"name":"getInvestmentDetails","outputs":[{"components":[{"internalType":"uint256","name":"planId","type":"uint256"},{"internalType":"uint256","name":"amount","type":"uint256"},{"internalType":"uint256","name":"startTime","type":"uint256"},{"internalType":"uint256","name":"endTime","type":"uint256"},{"internalType":"uint256","name":"totalReturn","type":"uint256"},{"internalType":"bool","name":"withdrawn","type":"bool"}],"internalType":"struct HirbiPro.Investment[]","name":"","type":"tuple[]"}],"stateMutability":"view","type":"function"}];
    const usdtAbi = ["function approve(address spender, uint256 amount) public returns (bool)", "function balanceOf(address account) public view returns (uint256)"];

    async function connectWallet() {
        if (window.ethereum) {
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();
            const addr = await signer.getAddress();
            document.getElementById("connectBtn").innerText = addr.substring(0,6) + "..." + addr.substring(38);
            document.getElementById("userStats").style.display = "grid";
            loadDashboard();
        }
    }

    async function invest(planId) {
        if(!signer) return connectWallet();
        const amount = document.getElementById("amt" + planId).value;
        const amtWei = ethers.utils.parseUnits(amount, 18);
        const usdt = new ethers.Contract(usdtAddress, usdtAbi, signer);
        const platform = new ethers.Contract(contractAddress, abi, signer);

        try {
            const tx1 = await usdt.approve(contractAddress, amtWei);
            await tx1.wait();
            const tx2 = await platform.invest(planId, amtWei, "0x0000000000000000000000000000000000000000", { gasLimit: 400000 });
            await tx2.wait();
            alert("Session Started Successfully!");
            loadDashboard();
        } catch (e) { alert("Transaction Failed"); }
    }

    async function loadDashboard() {
        const platform = new ethers.Contract(contractAddress, abi, signer);
        const addr = await signer.getAddress();
        const investments = await platform.getInvestmentDetails(addr);
        
        const container = document.getElementById("investmentsList");
        container.innerHTML = "";

        let tInvested = 0, tWithdrawn = 0, tProfit = 0;

        investments.forEach((inv, index) => {
            const principal = parseFloat(ethers.utils.formatUnits(inv.amount, 18));
            const totalRet = parseFloat(ethers.utils.formatUnits(inv.totalReturn, 18));
            const isWithdrawn = inv.withdrawn;
            const pName = planNames[inv.planId] || "UNKNOWN NODE"; // Using the new names

            tInvested += principal;
            if(isWithdrawn) {
                tWithdrawn += totalRet;
                tProfit += (totalRet - principal);
            }

            const div = document.createElement("div");
            div.className = "plan-card";
            div.style.marginBottom = "15px";
            div.style.textAlign = "left";
            div.style.padding = "25px";
            
            if(isWithdrawn) {
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <span class="plan-tag">${pName}</span>
                            <div style="margin-top:10px; font-weight:bold;">Principal: ${principal} USDT</div>
                        </div>
                        <div style="text-align:right;">
                            <div style="color:#28a745; font-weight:bold;">+${(totalRet - principal).toFixed(2)} PROFIT</div>
                            <small style="color:#666;">WITHDRAWN</small>
                        </div>
                    </div>
                `;
            } else {
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="plan-tag">${pName}</span>
                        <span id="timer-${index}" style="color:var(--orange); font-size:12px; font-family:'Orbitron';"></span>
                    </div>
                    <div class="live-counter" id="live-${index}">0.00000000</div>
                    <div style="font-size:12px; color:#666;">Investment: ${principal} USDT</div>
                    <button id="btn-${index}" class="btn-invest" style="display:none; background:#28a745; height:45px; margin-top:15px;" onclick="withdraw(${index})">COLLECT PROFITS</button>
                `;
                
                setInterval(() => {
                    const now = Math.floor(Date.now() / 1000);
                    const start = inv.startTime.toNumber();
                    const end = inv.endTime.toNumber();
                    if (now >= end) {
                        document.getElementById("live-" + index).innerText = totalRet.toFixed(4) + " USDT";
                        document.getElementById("btn-" + index).style.display = "block";
                        document.getElementById("timer-" + index).innerText = "MATURED";
                    } else {
                        const growth = principal + ((totalRet - principal) / (end - start)) * (now - start);
                        document.getElementById("live-" + index).innerText = growth.toFixed(8) + " USDT";
                        const rem = end - now;
                        document.getElementById("timer-" + index).innerText = Math.floor(rem/60) + "m REMAINING";
                    }
                }, 1000);
            }
            container.appendChild(div);
        });

        document.getElementById("totalInvested").innerText = tInvested.toFixed(2) + " USDT";
        document.getElementById("totalWithdrawn").innerText = tWithdrawn.toFixed(2) + " USDT";
        document.getElementById("totalProfit").innerText = "+" + tProfit.toFixed(2) + " USDT";
    }

    async function withdraw(index) {
        const platform = new ethers.Contract(contractAddress, abi, signer);
        try {
            const tx = await platform.withdraw(index, { gasLimit: 250000 });
            await tx.wait();
            alert("Profits Collected!");
            loadDashboard();
        } catch (e) { alert("Error in collection"); }
    }
</script>
</body>
</html>
